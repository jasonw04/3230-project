<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MathPals - Account Overview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>


<body data-page="account">

  <div id="avatarBackground" class="avatar-background"></div>
  <body data-page="parent" class="no-avatar-bg"></body> 

  <div class="app-shell py-4">
    <main class="container">

      <section class="mb-5">

        <!-- header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="section-title mb-0">Account Overview</h2>
          <a class="home-btn" href="home.html">Home</a>
        </div>


        <div class="mb-5">
          <div class="mini-title mb-3">Account details</div>

          <p class="fs-4 text-secondary mb-2">
            Name: <span id="accountName"></span>
          </p>

          <p class="fs-4 text-secondary mb-2">
            Date registered: <span id="accountDate"></span>
          </p>

          <p class="fs-4 text-secondary">
            Account age: <span id="accountAge"></span>
          </p>
        </div>

        <div class="mini-title mb-3">Account statistics</div>

        <!-- top stats -->
        <div class="row g-4 mb-4">

          <div class="col-md-4">
            <div class="stat-card p-4 text-center h-100">
              <h5>Total problems answered</h5>
              <p class="display-5 mt-3" id="statTotal">0</p>
            </div>
          </div>

          <div class="col-md-4">
            <div class="stat-card p-4 text-center h-100">
              <h5>Total correct answers</h5>
              <p class="display-5 mt-3" id="statCorrect">0</p>
            </div>
          </div>

          <div class="col-md-4">
            <div class="stat-card p-4 text-center h-100">
              <h5>Accuracy</h5>
              <p class="display-5 mt-3" id="statAccuracy">0%</p>
            </div>
          </div>

        </div>

      
        <!-- bottom stats -->
        <div class="row g-4">

          <div class="col-md-6">
            <div class="stat-card p-4 text-center h-100">
              <h5>Stars earned</h5>
              <p class="display-5 mt-3" id="statStars">0</p>
            </div>
          </div>

          <div class="col-md-6">
            <div class="stat-card p-4 h-100">

              <!--mute button-->
              <h5 class="text-center">Mute option</h5>

              <div class="form-check form-switch fs-5 mt-4 d-flex justify-content-center">
                <input class="form-check-input" type="checkbox" role="switch" id="muteSwitch">
                <label class="form-check-label ms-2" for="muteSwitch">Mute sounds</label>
              </div>

              <p class="muted-note mt-4 text-center">
                Required accessibility control for sound effects.
              </p>

            </div>
          </div>

        </div>

      </section>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
