<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MathPals - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="home">
  <div class="app-shell">
    <main>
      <section>
        <h1 class="brand-title">MathPals</h1>
        <p class="subtitle">Fun math practice for little learners</p>
        <div class="welcome-line" id="homeWelcome">Welcome back</div>
        <div class="row g-5 mx-auto" style="max-width:980px;">
          <div class="col-md-6">
            <div class="d-grid gap-5">
              <a class="big-tile tile-green text-decoration-none d-flex justify-content-center align-items-center" href="parent-dashboard.html">Parent Dashboard</a>
              <a class="big-tile tile-green text-decoration-none d-flex justify-content-center align-items-center" href="account-overview.html">Account Overview</a>
              <a class="big-tile tile-green text-decoration-none d-flex justify-content-center align-items-center" href="previous-answers.html">View Previous Answers</a>
              <a class="big-tile tile-green text-decoration-none d-flex justify-content-center align-items-center" href="rewards.html">New Problem Sets</a>
            </div>
          </div>
          <div class="col-md-6">
            <div class="d-grid gap-5">
              <a class="big-tile tile-teal text-decoration-none d-flex justify-content-center align-items-center" href="index.html">Select Profile</a>
              <button class="big-tile tile-teal" onclick="startGame('easy')">Easy Problem</button>
              <button class="big-tile tile-teal" onclick="startGame('medium')">Medium Problem</button>
              <button class="big-tile tile-teal" onclick="startGame('hard')">Hard Problem</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
