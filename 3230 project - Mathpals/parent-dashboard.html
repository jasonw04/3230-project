<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MathPals - Parent Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>


<body data-page="parent">

  <div id="avatarBackground" class="avatar-background"></div>
  <body data-page="parent" class="no-avatar-bg"></body>
  <div class="app-shell">
    <main>
      <section>
        <h2 class="section-title">Parent Dashboard</h2>

        <div class="nav-actions">
          <a class="home-btn" href="home.html">Home</a>
        </div>

        <!-- child progress -->
        <div class="mini-title">
          (<span id="parentChildName">Child</span>) progress
        </div>

        <div class="panel-box mb-5">
          <div class="row g-4">

            <!-- accuracy -->
            <div class="col-lg-4 d-flex">
              <div class="inner-card w-100">
                <h4>Accuracy Trend</h4>
                <div class="chart-bars" id="trendBars"></div>

                <div class="chart-labels">
                  <span>Old</span>
                  <span>Now</span>
                </div>
              </div>
            </div>
            <!-- time spent -->
            <div class="col-lg-4 d-flex">
              <div class="inner-card w-100">
                <h4>Time Spent</h4>

                <p class="mb-2 mt-4 fs-5">
                  Today: <strong id="timeToday">0 min</strong>
                </p>

                <p class="mb-2 fs-5">
                  This week: <strong id="timeWeek">0 min</strong>
                </p>

                <p class="muted-note mt-4">
                  Tracked automatically while solving problems.
                </p>
              </div>
            </div>

            <!-- difficulty -->
            <div class="col-lg-4 d-flex">
              <div class="inner-card w-100">
                <h4>Change Difficulty</h4>

                <div class="d-grid gap-3 mt-4">
                  <button class="big-tile tile-teal"
                          type="button"
                          onclick="setProfileDifficulty('easy')">
                    Easy
                  </button>

                  <button class="big-tile tile-teal"
                          type="button"
                          onclick="setProfileDifficulty('medium')">
                    Medium
                  </button>

                  <button class="big-tile tile-teal"
                          type="button"
                          onclick="setProfileDifficulty('hard')">
                    Hard
                  </button>
                </div>

                <p class="mt-3 fw-bold">
                  Current: <span id="currentDifficultyLabel">Easy</span>
                </p>
              </div>
            </div>
          </div>
        </div>

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-3">

          <!-- header -->
          <div class="mini-title mb-0">
            Manage Children
          </div>

          <!-- add child -->
          <div class="d-flex gap-2 flex-wrap">
            <button class="dark-pill"
                    type="button"
                    data-bs-toggle="modal"
                    data-bs-target="#createProfileModal">
              Create Child
            </button>
          </div>
        </div>
        <div class="panel-box" id="manageChildrenList"></div>
      </section>
    </main>
  </div>

  <!-- child profile - same as in index-->
  <div class="modal fade"
       id="createProfileModal"
       tabindex="-1"
       aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0 shadow">
        <div class="modal-header border-0 pb-0">
          <h3 class="modal-title">Create Child Profile</h3>
          <button type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                  aria-label="Close">
          </button>
        </div>

        <div class="modal-body pt-2">
          <div class="mb-3">
            <label class="form-label fw-bold">Child name</label>
            <input type="text"
                   class="form-control form-control-lg"
                   id="newChildName"
                   maxlength="18"
                   placeholder="Enter name">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Choose avatar</label>
            <div class="d-flex flex-wrap gap-2"
                 id="avatarChoices"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Session time limit (minutes)</label>
            <input type="number"
                   class="form-control form-control-lg"
                   id="newChildLimit"
                   min="5"
                   max="60"
                   value="15">
          </div>
        </div>

        <div class="modal-footer border-0 pt-0">
          <button type="button"
                  class="btn btn-secondary btn-lg"
                  data-bs-dismiss="modal">
            Cancel
          </button>

          <button type="button"
                  class="btn btn-dark btn-lg"
                  onclick="createProfile()">
            Save Child
          </button>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
