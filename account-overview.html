<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MathPals - Account Overview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="account">
  <div class="app-shell">
    <main>
      <section>
        <h2 class="section-title">Account Overview</h2>
        <div class="nav-actions"><a class="home-btn" href="home.html">Home</a></div>
        <div class="row g-4 mb-4">
          <div class="col-12">
            <div class="mini-title mb-2">Account details</div>
            <p class="fs-3 text-secondary mb-1">Name: <span id="accountName"></span></p>
            <p class="fs-3 text-secondary mb-1">Date registered: <span id="accountDate"></span></p>
            <p class="fs-3 text-secondary mb-0">Account age: <span id="accountAge"></span></p>
          </div>
        </div>
        <div class="mini-title">Account statistics</div>
        <div class="row g-4">
          <div class="col-md-4"><div class="stat-card"><h3>Total problems answered</h3><p class="display-4 mt-4" id="statTotal">0</p></div></div>
          <div class="col-md-4"><div class="stat-card"><h3>Total correct answers</h3><p class="display-4 mt-4" id="statCorrect">0</p></div></div>
          <div class="col-md-4"><div class="stat-card"><h3>Accuracy</h3><p class="display-4 mt-4" id="statAccuracy">0%</p></div></div>
        </div>
        <div class="row g-4 mt-2">
          <div class="col-md-6"><div class="stat-card"><h3>Stars earned</h3><p class="display-4 mt-4" id="statStars">0</p></div></div>
          <div class="col-md-6"><div class="stat-card"><h3>Mute option</h3><div class="form-check form-switch fs-4 mt-4"><input class="form-check-input" type="checkbox" role="switch" id="muteSwitch"><label class="form-check-label ms-2" for="muteSwitch">Mute sounds</label></div><p class="muted-note mt-4">Required accessibility control for sound effects.</p></div></div>
        </div>
      </section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
