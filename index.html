<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MathPals - Profiles</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="profiles">
  <div class="app-shell">
    <main>
      <section>
        <h1 class="brand-title">MathPals</h1>
        <p class="subtitle">Fun math practice for little learners</p>
        <div class="welcome-line">Welcome Back</div>
        <div class="mx-auto" style="max-width:980px;">
          <div id="profileList"></div>
          <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
            <a class="dark-pill" href="parent-dashboard.html">Parent Area</a>
            <button class="dark-pill" data-bs-toggle="modal" data-bs-target="#createProfileModal">Create Child</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal fade" id="createProfileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 border-0 shadow">
        <div class="modal-header border-0 pb-0">
          <h3 class="modal-title">Create Child Profile</h3>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-2">
          <div class="mb-3">
            <label class="form-label fw-bold">Child name</label>
            <input type="text" class="form-control form-control-lg" id="newChildName" maxlength="18" placeholder="Enter name">
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Choose avatar</label>
            <div class="d-flex flex-wrap gap-2" id="avatarChoices"></div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Session time limit (minutes)</label>
            <input type="number" class="form-control form-control-lg" id="newChildLimit" min="5" max="60" value="15">
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-secondary btn-lg" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-dark btn-lg" onclick="createProfile()">Save Child</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
